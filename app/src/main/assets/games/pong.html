<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; touch-action: none; }
  canvas { display: block; }
</style>
</head><body>
<canvas id="c"></canvas>
<script src="sound.js"></script>
<script src="loader.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
const state = {
  ball: { x: 0, y: 0, vx: 5, vy: 3, r: 8 },
  p1: { y: 0, score: 0 }, // left (player)
  p2: { y: 0, score: 0 }, // right (AI)
  paddleH: 80,
  paddleW: 12,
  margin: 20,
  running: true,
  touch: null
};

function resetBall(dir) {
  state.ball.x = canvas.width / 2;
  state.ball.y = canvas.height / 2;
  const speed = 5;
  const angle = (Math.random() - 0.5) * Math.PI / 3;
  state.ball.vx = Math.cos(angle) * speed * dir;
  state.ball.vy = Math.sin(angle) * speed;
}

function init() {
  state.p1.y = canvas.height / 2;
  state.p2.y = canvas.height / 2;
  resetBall(1);
}

// Touch controls
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  state.touch = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  state.touch = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('mousemove', e => { state.touch = e.clientY; });

function update() {
  const W = canvas.width, H = canvas.height;
  const b = state.ball;
  const ph = state.paddleH / 2;

  // Player paddle follows touch
  if (state.touch !== null) {
    const target = state.touch;
    state.p1.y += (target - state.p1.y) * 0.15;
  }

  // AI paddle — beatable but challenging
  const aiSpeed = 2.5;
  const diff = b.y - state.p2.y;
  // AI has reaction delay — only tracks when ball is on its half
  if (b.x > W() * 0.35 && Math.abs(diff) > 15) {
    // AI sometimes misjudges (5% chance to hesitate)
    if (Math.random() > 0.05) {
      state.p2.y += Math.sign(diff) * Math.min(aiSpeed, Math.abs(diff) * 0.08);
    }
  }

  // Clamp paddles
  state.p1.y = Math.max(ph, Math.min(H - ph, state.p1.y));
  state.p2.y = Math.max(ph, Math.min(H - ph, state.p2.y));

  // Ball movement
  b.x += b.vx;
  b.y += b.vy;

  // Top/bottom bounce
  if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); }
  if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy); }

  // Left paddle collision
  const lx = state.margin + state.paddleW;
  if (b.x - b.r < lx && b.x - b.r > state.margin &&
      b.y > state.p1.y - ph && b.y < state.p1.y + ph) {
    b.x = lx + b.r;
    const hitPos = (b.y - state.p1.y) / ph;
    const angle = hitPos * Math.PI / 4;
    const spd = Math.min(Math.sqrt(b.vx*b.vx + b.vy*b.vy) + 0.2, 9);
    b.vx = Math.cos(angle) * spd;
    b.vy = Math.sin(angle) * spd;
    if (b.vx < 1) b.vx = 1;
    if (typeof SFX !== 'undefined') SFX.paddleHit();
  }

  // Right paddle collision
  const rx = W - state.margin - state.paddleW;
  if (b.x + b.r > rx && b.x + b.r < W - state.margin &&
      b.y > state.p2.y - ph && b.y < state.p2.y + ph) {
    b.x = rx - b.r;
    const hitPos = (b.y - state.p2.y) / ph;
    const angle = Math.PI - hitPos * Math.PI / 4;
    const spd = Math.min(Math.sqrt(b.vx*b.vx + b.vy*b.vy) + 0.2, 9);
    b.vx = -Math.abs(Math.cos(angle) * spd);
    b.vy = Math.sin(angle) * spd;
    if (typeof SFX !== 'undefined') SFX.paddleHit();
  }

  // Top/bottom bounce sound
  if ((b.y - b.r <= 0 || b.y + b.r >= H) && typeof SFX !== 'undefined') SFX.wallHit();

  // Score
  if (b.x < 0) { state.p2.score++; resetBall(1); if (typeof SFX !== 'undefined') SFX.score(); }
  if (b.x > W) { state.p1.score++; resetBall(-1); if (typeof SFX !== 'undefined') SFX.score(); }
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  const ph = state.paddleH / 2;
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(state.margin, state.p1.y - ph, state.paddleW, state.paddleH);

  ctx.fillStyle = '#ff7043';
  ctx.fillRect(W - state.margin - state.paddleW, state.p2.y - ph, state.paddleW, state.paddleH);

  // Ball
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(state.ball.x, state.ball.y, state.ball.r, 0, Math.PI * 2);
  ctx.fill();

  // Scores
  ctx.fillStyle = '#4fc3f7';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(state.p1.score, W / 2 - 60, 60);

  ctx.fillStyle = '#ff7043';
  ctx.fillText(state.p2.score, W / 2 + 60, 60);

  // Title
  ctx.fillStyle = '#333';
  ctx.font = '12px monospace';
  ctx.fillText('PONG', W / 2, H - 10);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
</body></html>
