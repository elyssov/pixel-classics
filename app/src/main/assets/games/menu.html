<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Classics</title>
<style>
  @font-face {
    font-family: 'DOS';
    src: local('Consolas'), local('Courier New'), local('monospace');
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0000AA;
    color: #AAAAAA;
    font-family: 'Consolas', 'Courier New', monospace;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ═══ NC-style top bar ═══ */
  .top-bar {
    background: #000000;
    color: #00AAAA;
    padding: 2px 8px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    letter-spacing: 1px;
  }

  /* ═══ Main panel ═══ */
  .panel {
    flex: 1;
    margin: 4px;
    border: 2px solid #00AAAA;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    background: #000000;
    color: #FFFF55;
    text-align: center;
    padding: 4px 0;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 3px;
    border-bottom: 1px solid #00AAAA;
  }

  .panel-header .fire { color: #FF5555; }

  /* ═══ Game list ═══ */
  .game-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .game-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    cursor: pointer;
    transition: none;
    gap: 10px;
    border-bottom: 1px solid #000088;
  }

  .game-item:hover,
  .game-item:active {
    background: #00AAAA;
    color: #000000;
  }

  .game-item:hover .game-year,
  .game-item:active .game-year {
    color: #000088;
  }

  .game-item:hover .game-icon,
  .game-item:active .game-icon {
    color: #000000;
  }

  .game-item.selected {
    background: #00AAAA;
    color: #000000;
  }

  .game-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
    color: #FFFF55;
    flex-shrink: 0;
  }

  .game-info {
    flex: 1;
    min-width: 0;
  }

  .game-name {
    font-size: 15px;
    font-weight: bold;
    color: #FFFFFF;
    letter-spacing: 0.5px;
  }

  .game-item:hover .game-name,
  .game-item:active .game-name,
  .game-item.selected .game-name {
    color: #000000;
  }

  .game-desc {
    font-size: 11px;
    color: #AAAAAA;
    margin-top: 1px;
  }

  .game-item:hover .game-desc,
  .game-item:active .game-desc {
    color: #000088;
  }

  .game-year {
    font-size: 12px;
    color: #00AAAA;
    flex-shrink: 0;
  }

  .game-mode {
    font-size: 10px;
    padding: 1px 4px;
    border: 1px solid #00AAAA;
    color: #00AAAA;
    flex-shrink: 0;
  }

  .game-item:hover .game-mode {
    border-color: #000088;
    color: #000088;
  }

  .game-mode.pvp {
    color: #FF5555;
    border-color: #FF5555;
  }

  .game-item:hover .game-mode.pvp {
    color: #000088;
    border-color: #000088;
  }

  /* ═══ Status bar ═══ */
  .status-bar {
    background: #000000;
    color: #AAAAAA;
    padding: 3px 8px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    border-top: 1px solid #00AAAA;
  }

  .status-bar .sync {
    color: #55FF55;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ═══ Bottom function keys ═══ */
  .fn-bar {
    background: #000000;
    display: flex;
    font-size: 12px;
  }

  .fn-key {
    flex: 1;
    text-align: center;
    padding: 5px 2px;
    cursor: pointer;
    border-right: 1px solid #333;
  }

  .fn-key:last-child { border: none; }

  .fn-key .num {
    color: #AAAAAA;
  }

  .fn-key .label {
    color: #000000;
    background: #00AAAA;
    padding: 0 3px;
  }

  .fn-key:active .label {
    background: #FFFFFF;
  }

  /* ═══ Info panel (bottom half on wide screens) ═══ */
  .info-panel {
    margin: 0 4px 4px;
    border: 2px solid #00AAAA;
    padding: 8px 12px;
    max-height: 120px;
    overflow-y: auto;
  }

  .info-panel h3 {
    color: #FFFF55;
    font-size: 13px;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .info-panel p {
    font-size: 12px;
    line-height: 1.5;
    color: #AAAAAA;
  }

  .info-panel .highlight { color: #55FF55; }
  .info-panel .warning { color: #FF5555; }

  /* ═══ Responsive ═══ */
  @media (max-height: 500px) {
    .info-panel { display: none; }
    .game-item { padding: 6px 12px; }
  }
</style>
</head><body>

<div class="top-bar">
  <span>Pixel Classics v1.0</span>
  <span>&#9484;&#9472; C:\GAMES &#9472;&#9488;</span>
  <span>Free: 640K</span>
</div>

<div class="panel">
  <div class="panel-header">
    &#9556;&#9552; C:\GAMES &#9552;&#9559;
  </div>
  <div class="game-list" id="game-list"></div>
</div>

<div class="info-panel" id="info-panel">
  <h3>&#9654; ABOUT</h3>
  <p>Classic arcade games from the <span class="highlight">golden age</span> of gaming.
     Tap a game to play. <span class="highlight">Multiplayer</span> games sync via local WiFi.</p>
</div>

<div class="status-bar">
  <span><span class="sync">&#9679;</span> Score sync active &mdash; 0 players nearby</span>
  <span id="clock"></span>
</div>

<div class="fn-bar">
  <div class="fn-key"><span class="num">1</span><span class="label">Help</span></div>
  <div class="fn-key"><span class="num">2</span><span class="label">Scores</span></div>
  <div class="fn-key"><span class="num">3</span><span class="label">Settings</span></div>
  <div class="fn-key"><span class="num">4</span><span class="label">About</span></div>
</div>

<script>
const games = [
  { name: "Naval Battle",     icon: "\u2693", desc: "Strategic sea combat",         year: "1990", file: "naval_battle.html", mode: "PvP" },
  { name: "Missile Command",  icon: "\uD83D\uDE80", desc: "Defend your cities from ICBMs",  year: "1980", file: "missile_command.html", mode: "1P" },
  { name: "Paratrooper",      icon: "\uD83C\uDF96", desc: "Shoot paratroopers from the sky", year: "1982", file: "paratrooper.html", mode: "1P" },
  { name: "Pong",             icon: "\uD83C\uDFD3", desc: "The original video game",        year: "1972", file: "pong.html", mode: "PvP" },
  { name: "Snake",            icon: "\uD83D\uDC0D", desc: "Nokia classic — eat and grow",   year: "1998", file: "snake.html", mode: "1P" },
  { name: "Tetris",           icon: "\uD83D\uDFE6", desc: "Russian masterpiece",            year: "1984", file: "tetris.html", mode: "1P" },
  { name: "Arkanoid",         icon: "\uD83E\uDDF1", desc: "Break all the bricks",           year: "1986", file: "arkanoid.html", mode: "1P" },
  { name: "Minesweeper",      icon: "\uD83D\uDCA3", desc: "Think before you click",         year: "1990", file: "minesweeper.html", mode: "1P" },
];

const list = document.getElementById('game-list');

games.forEach((g, i) => {
  const item = document.createElement('div');
  item.className = 'game-item';
  item.innerHTML = `
    <span class="game-icon">${g.icon}</span>
    <div class="game-info">
      <div class="game-name">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
    </div>
    <span class="game-year">${g.year}</span>
    <span class="game-mode ${g.mode === 'PvP' ? 'pvp' : ''}">${g.mode}</span>
  `;
  item.addEventListener('click', () => {
    window.location.href = g.file;
  });
  list.appendChild(item);
});

// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);
</script>
</body></html>
