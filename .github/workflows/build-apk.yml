name: Build Pixel Classics APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-aar:
    name: Build Go mesh core (.aar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Iskra (mesh core)
        uses: actions/checkout@v4
        with:
          repository: elyssov/iskra
          path: iskra-src

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install gomobile
        env:
          GOTOOLCHAIN: auto
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Build .aar from Iskra module
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/26.1.10909125"
          export CGO_LDFLAGS="-Wl,-z,max-page-size=16384"
          export GOTOOLCHAIN=auto
          gomobile init
          mkdir -p app/libs
          # Build from within Iskra module where cmd/cargo has access to internal packages
          cd iskra-src
          gomobile bind -v -target=android/arm64,android/arm -androidapi 24 \
            -o ../app/libs/core.aar \
            ./cmd/cargo/

      - uses: actions/upload-artifact@v4
        with:
          name: core-aar
          path: app/libs/core.aar

  build-apk:
    name: Build APK
    needs: build-aar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: core-aar
          path: app/libs/

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app/pixel-classics-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias pixelclassics \
            -storepass pixelclassics2026 \
            -keypass pixelclassics2026 \
            -dname "CN=Pixel Classics, O=Pixel, L=Moscow, C=RU"

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: pixelclassics2026
          KEY_ALIAS: pixelclassics
          KEY_PASSWORD: pixelclassics2026
        run: gradle -p . assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/pixel-classics-v1.apk
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: pixel-classics-apk
          path: dist/pixel-classics-v1.apk
