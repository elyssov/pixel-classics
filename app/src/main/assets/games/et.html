<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>E.T. The Extra-Terrestrial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: #000; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  #dpad {
    display: none; position: fixed; bottom: 18px; left: 12px; z-index: 10;
    width: 140px; height: 140px;
  }
  .dbtn {
    position: absolute; background: rgba(180,180,180,0.28); border: 2px solid rgba(200,200,200,0.45);
    color: rgba(220,220,220,0.6); font: bold 18px monospace; text-align: center;
    width: 44px; height: 44px; line-height: 44px; user-select: none; -webkit-user-select: none;
    border-radius: 0; cursor: pointer;
  }
  .dbtn:active { background: rgba(255,255,255,0.35); }
  #btn-up    { left: 48px; top: 0; }
  #btn-down  { left: 48px; top: 92px; }
  #btn-left  { left: 2px;  top: 46px; }
  #btn-right { left: 94px; top: 46px; }
  #btn-neck {
    display: none; position: fixed; bottom: 48px; right: 16px; z-index: 10;
    background: rgba(90,180,60,0.30); border: 2px solid rgba(90,180,60,0.50);
    color: rgba(160,220,120,0.7); font: bold 14px monospace; text-align: center;
    width: 64px; height: 52px; line-height: 52px; user-select: none; -webkit-user-select: none;
    border-radius: 0; cursor: pointer;
  }
  #btn-neck:active { background: rgba(120,220,80,0.45); }
</style>
</head><body>
<canvas id="c"></canvas>
<div id="dpad">
  <div class="dbtn" id="btn-up">&uarr;</div>
  <div class="dbtn" id="btn-left">&larr;</div>
  <div class="dbtn" id="btn-right">&rarr;</div>
  <div class="dbtn" id="btn-down">&darr;</div>
</div>
<div id="btn-neck">NECK</div>
<script src="sound.js"></script>
<script src="loader.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpad = document.getElementById('dpad');
const neckBtn = document.getElementById('btn-neck');

// ============================================
// E.T. THE EXTRA-TERRESTRIAL
// Authentic Atari 2600 TIA look
// Each game pixel = 11 screen pixels
// ============================================

const PX = 11;

// Atari 2600 TIA palette (limited, ugly, authentic)
const C = {
  black:   '#000000',
  green:   '#30b020',  // E.T. body
  dkGreen: '#1a6010',  // forest bg
  blue:    '#3050c0',  // FBI
  white:   '#c0c0c0',  // scientist
  yellow:  '#d0c010',  // phone / score
  red:     '#c02020',  // danger
  brown:   '#6a4a20',  // wasteland
  dkBrown: '#3a2a10',  // wasteland bg
  gray:    '#808080',  // ship / city fg
  dkGray:  '#383838',  // city bg
  orange:  '#c06820',  // desert fg
  sky:     '#1828a0',  // landing bg
  skyFg:   '#3040d0',  // landing fg
  pink:    '#d070a0',  // elliott text
  phone:   '#e8e828',  // phone pieces
};

let W, H, GW, GH;

const STATE = { TITLE: 0, PLAY: 1, PIT: 2, CAUGHT: 3, CALL: 4, WIN: 5, DEAD: 6 };
let state = STATE.TITLE;

const ZONE_NAMES = ['FOREST', 'WASTELAND', 'CITY', 'DESERT', 'LANDING', 'VOID'];
const ZONE_COLORS = [
  { bg: C.dkGreen, fg: C.green },
  { bg: C.dkBrown, fg: C.brown },
  { bg: C.dkGray,  fg: C.gray },
  { bg: C.brown,   fg: C.orange },
  { bg: C.sky,     fg: C.skyFg },
  { bg: C.black,   fg: C.dkBrown },
];

const ZONE_PITS = { 1: [], 3: [], 5: [] };

let et, fbi, scientist;
let phonePieces = [];
let candies = [];
let currentZone = 0;
let energy = 100;
let timer = 99;
let timerAccum = 0;
let score = 0;
let pitFalls = 0;
let elliottRevives = 3;
let inPit = false;
let pitY = 0;
let neckExtended = false;
let levitating = false;
let inputDelay = 0;
let pendingDir = null;
let tipTimer = 0;
let currentTip = '';
let msgTimer = 0;
let currentMsg = '';
let flashTimer = 0;
let titleBlink = 0;
let caughtTimer = 0;
let callTimer = 0;
let shipY = -20;
let winTimer = 0;

const TIPS = [
  "TIP: TRY NOT FALLING IN PIT",
  "TIP: GAME GETS EASIER WHEN YOU STOP",
  "TIP: MADE IN 5 WEEKS. IT SHOWS.",
  "TIP: PITS ARE A FEATURE NOT A BUG",
  "TIP: E.T. PHONE HOME. E.T. FALL IN HOLE.",
  "TIP: 3.5 MILLION BURIED IN LANDFILL",
  "TIP: YOU PAID $49.95 FOR THIS IN 1982",
  "TIP: THE DEVELOPER CRIED TOO",
  "TIP: HAVE YOU TRIED NOT PLAYING?",
  "TIP: AN ATARI EXEC IS STILL SORRY",
];

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  GW = Math.floor(W / PX);
  GH = Math.floor(H / PX);
}

function generateLevel() {
  currentZone = 0;
  energy = 100;
  timer = 99;
  timerAccum = 0;
  pitFalls = 0;
  inPit = false;
  levitating = false;
  neckExtended = false;
  score = 0;
  elliottRevives = 3;

  et = { x: Math.floor(GW/2), y: Math.floor(GH/2), dx: 0, dy: 0 };
  fbi = { x: 5, y: 5, zone: 2, dx: 0, dy: 0, moveTimer: 0 };
  scientist = { x: GW - 8, y: GH - 8, zone: 0, dx: 0, dy: 0, moveTimer: 0 };

  phonePieces = [
    { zone: 1, x: randInt(4, GW-6), y: randInt(5, GH-6), collected: false },
    { zone: 3, x: randInt(4, GW-6), y: randInt(5, GH-6), collected: false },
    { zone: 5, x: randInt(4, GW-6), y: randInt(5, GH-6), collected: false },
  ];

  for (let z of [1, 3, 5]) {
    ZONE_PITS[z] = [];
    for (let i = 0; i < 3 + randInt(0,2); i++) {
      ZONE_PITS[z].push({
        x: randInt(2, GW-7),
        y: randInt(4, GH-6),
        w: 3 + randInt(0,2),
        h: 2 + randInt(0,1)
      });
    }
  }

  candies = [];
  for (let z = 0; z < 6; z++) {
    for (let i = 0; i < 2; i++) {
      candies.push({ zone: z, x: randInt(2, GW-4), y: randInt(4, GH-4), active: true });
    }
  }

  tipTimer = 300;
  currentTip = TIPS[randInt(0, TIPS.length-1)];
}

function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

// ===== DRAWING (chunky Atari blocks) =====

function px(x, y, color, w, h) {
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, (w||1) * PX, (h||1) * PX);
}

function drawText(text, cx, cy, color, size) {
  ctx.fillStyle = color || C.white;
  ctx.font = 'bold ' + (size || 14) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, cx, cy);
}

function drawZone() {
  let zc = ZONE_COLORS[currentZone];

  // Solid background fill
  ctx.fillStyle = zc.bg;
  ctx.fillRect(0, 0, W, H);

  // Sparse terrain blocks (very few, very chunky)
  for (let x = 0; x < GW; x += 4) {
    for (let y = 3; y < GH - 2; y += 3) {
      if ((x + y + currentZone * 3) % 11 < 2) {
        px(x, y, zc.fg, 2, 1);
      }
    }
  }

  // Top bar: zone name
  ctx.fillStyle = C.black;
  ctx.fillRect(0, 0, W, PX * 2);
  drawText(ZONE_NAMES[currentZone], W/2, PX * 1.5, zc.fg, 13);

  // Pits: barely darker than background (infuriating)
  if (ZONE_PITS[currentZone]) {
    for (let p of ZONE_PITS[currentZone]) {
      let pitColor;
      if (currentZone === 1) pitColor = '#2a1a0880';
      else if (currentZone === 3) pitColor = '#4a3a1880';
      else pitColor = '#00000050';
      px(p.x, p.y, pitColor, p.w, p.h);
    }
  }
}

// E.T.: 3 wide x 8 tall green rectangle. That's it.
function drawET() {
  if (inPit) {
    let py = et.y - 1 + Math.floor(pitY);
    // Body sunk in pit
    px(et.x, py + 3, C.green, 3, 5);
    // Head (1px on top of center column)
    let headY = py + 2;
    if (neckExtended) headY = py; // neck stretches up 2
    px(et.x + 1, headY, C.green, 1, 1);
    // Neck extension (fill gap)
    if (neckExtended) {
      px(et.x + 1, py + 1, C.green, 1, 2);
    }
    // Levitation sparkle
    if (levitating && flashTimer % 6 < 3) {
      px(et.x + randInt(-1,3), headY - 1, C.yellow, 1, 1);
    }
    return;
  }

  // Body: 3x6 solid green block
  px(et.x, et.y + 2, C.green, 3, 6);
  // Head: center column, 1px
  let headY = et.y + 1;
  if (neckExtended) {
    // Neck stretches: head moves up 2, neck column fills gap
    px(et.x + 1, et.y - 1, C.green, 1, 1); // head up high
    px(et.x + 1, et.y, C.green, 1, 2);      // neck fill
  } else {
    px(et.x + 1, headY, C.green, 1, 1);     // head normal
  }
}

// FBI Agent: 3x7 blue rectangle
function drawFBI() {
  if (fbi.zone !== currentZone) return;
  px(fbi.x, fbi.y, C.blue, 3, 7);
}

// Scientist: 3x7 white rectangle
function drawScientist() {
  if (scientist.zone !== currentZone) return;
  px(scientist.x, scientist.y, C.white, 3, 7);
}

// Phone pieces: 1x1 flickering dots
function drawPhonePieces() {
  for (let p of phonePieces) {
    if (p.collected || p.zone !== currentZone) continue;
    // Flicker on/off
    if (flashTimer % 8 < 5) {
      px(p.x, p.y, C.phone, 1, 1);
    }
  }
}

// Candies: 1x1 dots
function drawCandies() {
  for (let c of candies) {
    if (!c.active || c.zone !== currentZone) continue;
    px(c.x, c.y, C.orange, 1, 1);
  }
}

function drawHUD() {
  // Bottom bar
  ctx.fillStyle = C.black;
  ctx.fillRect(0, H - PX * 2, W, PX * 2);

  // Energy bar
  drawText('NRG', PX * 2, H - PX * 0.4, C.white, 10);
  let ew = Math.max(0, energy);
  ctx.fillStyle = energy > 30 ? C.green : C.red;
  ctx.fillRect(PX * 4, H - PX * 1.6, (ew / 100) * (W * 0.2), PX);
  ctx.strokeStyle = C.gray;
  ctx.strokeRect(PX * 4, H - PX * 1.6, W * 0.2, PX);

  // Timer
  drawText('T:' + Math.ceil(timer), W - PX * 5, H - PX * 0.4, C.yellow, 10);

  // Phone pieces
  let collected = phonePieces.filter(p => p.collected).length;
  drawText('PH:' + collected + '/3', W / 2, H - PX * 0.4, C.phone, 10);

  // Score top-left
  drawText('SC:' + score, PX * 4, PX * 1.5, C.yellow, 10);

  // Elliott revives top-right
  drawText('EL:' + elliottRevives, W - PX * 4, PX * 1.5, C.pink, 10);
}

function drawTip() {
  if (tipTimer > 0) {
    let alpha = Math.min(1, tipTimer / 60);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000000cc';
    ctx.fillRect(0, H * 0.72, W, PX * 2);
    drawText(currentTip, W/2, H * 0.72 + PX * 1.4, C.yellow, 9);
    ctx.globalAlpha = 1;
  }
}

function drawMessage() {
  if (msgTimer > 0) {
    ctx.fillStyle = '#000000cc';
    ctx.fillRect(0, H * 0.4, W, PX * 2.5);
    drawText(currentMsg, W/2, H * 0.4 + PX * 1.6, C.white, 11);
  }
}

function drawShip() {
  if (state === STATE.CALL || state === STATE.WIN) {
    let sx = Math.floor(GW / 2) - 4;
    px(sx + 3, shipY, C.gray, 3, 1);
    px(sx + 1, shipY + 1, C.gray, 7, 1);
    px(sx, shipY + 2, C.gray, 9, 1);
    // Lights
    if (flashTimer % 10 < 5) {
      px(sx + 2, shipY + 1, C.red, 1, 1);
      px(sx + 6, shipY + 1, C.yellow, 1, 1);
    }
  }
}

// ===== TITLE SCREEN =====
function drawTitle() {
  ctx.fillStyle = C.black;
  ctx.fillRect(0, 0, W, H);
  titleBlink++;

  // Stars (sparse, chunky)
  for (let i = 0; i < 30; i++) {
    let sx = ((i * 137 + titleBlink) % GW);
    let sy = ((i * 89) % GH);
    if (flashTimer % (3 + i % 5) < (2 + i % 3))
      px(sx, sy, C.white, 1, 1);
  }

  // E.T. sprite: 3 wide, head on top center column
  let cx = Math.floor(GW/2) - 1;
  let cy = Math.floor(GH/2) - 4;
  // Body 3x6
  px(cx, cy + 2, C.green, 3, 6);
  // Head 1x1
  px(cx + 1, cy + 1, C.green, 1, 1);
  // Neck bobbing
  if (titleBlink % 80 < 40) {
    px(cx + 1, cy - 1, C.green, 1, 1);
    px(cx + 1, cy, C.green, 1, 1);
  }

  drawText('E.T.', W/2, PX * 3, C.green, 26);
  drawText('THE EXTRA-TERRESTRIAL', W/2, PX * 5, C.green, 12);

  if (titleBlink % 80 < 60) {
    drawText('WORST GAME EVER MADE 1982', W/2, PX * 7, C.yellow, 9);
  }

  if (titleBlink % 60 < 40) {
    drawText('TAP TO START', W/2, H - PX * 4, C.white, 13);
  }

  drawText('D-PAD:MOVE  NECK:EXTEND', W/2, H - PX * 2, C.gray, 9);
}

// ===== GAME OVER =====
function drawGameOver() {
  ctx.fillStyle = C.black;
  ctx.fillRect(0, 0, W, H);
  titleBlink++;

  drawText('GAME OVER', W/2, H * 0.2, C.red, 22);
  drawText('E.T. PHONED HOME.', W/2, H * 0.35, C.gray, 12);
  drawText('NOBODY ANSWERED.', W/2, H * 0.42, C.gray, 12);

  // Grave: chunky block cross
  let gx = Math.floor(GW/2) - 2;
  let gy = Math.floor(GH * 0.6);
  px(gx, gy, C.gray, 5, 1);      // base
  px(gx+1, gy-3, C.gray, 3, 3);  // body
  px(gx, gy-2, C.gray, 5, 1);    // cross bar

  drawText('BURIED IN ALAMOGORDO NM', W/2, H * 0.78, C.brown, 10);
  drawText('SCORE: ' + score, W/2, H * 0.84, C.yellow, 12);
  drawText('PIT FALLS: ' + pitFalls, W/2, H * 0.89, C.orange, 10);

  if (titleBlink % 60 < 40) {
    drawText('TAP TO RETRY (WHY?)', W/2, H * 0.95, C.white, 11);
  }
}

// ===== WIN SCREEN =====
function drawWinScreen() {
  ctx.fillStyle = C.sky;
  ctx.fillRect(0, 0, W, H);
  titleBlink++;

  for (let i = 0; i < 40; i++) {
    let sx = ((i * 137 + winTimer) % GW);
    let sy = ((i * 89) % (GH - 5));
    px(sx, sy, C.white, 1, 1);
  }

  let sy2 = Math.max(-10, Math.floor(GH * 0.3) - Math.floor(winTimer / 3));
  let sx2 = Math.floor(GW/2) - 4;
  px(sx2+3, sy2, C.gray, 3, 1);
  px(sx2+1, sy2+1, C.gray, 7, 1);
  px(sx2, sy2+2, C.gray, 9, 1);

  drawText('CONGRATULATIONS', W/2, H * 0.5, C.green, 18);
  drawText('YOU BEAT THE WORST GAME', W/2, H * 0.6, C.white, 11);
  drawText('SCORE: ' + score, W/2, H * 0.7, C.yellow, 12);

  if (winTimer > 120 && titleBlink % 60 < 40) {
    drawText('TAP TO PLAY AGAIN (DONT)', W/2, H * 0.85, C.white, 11);
  }
  winTimer++;
}

// ===== UPDATE =====

function showMessage(msg, dur) {
  currentMsg = msg;
  msgTimer = dur || 120;
}

function showTip() {
  currentTip = TIPS[randInt(0, TIPS.length - 1)];
  tipTimer = 180;
}

function checkPitCollision() {
  if (!ZONE_PITS[currentZone]) return false;
  for (let p of ZONE_PITS[currentZone]) {
    if (et.x + 2 >= p.x && et.x <= p.x + p.w &&
        et.y + 7 >= p.y && et.y + 2 <= p.y + p.h) {
      return true;
    }
  }
  return false;
}

function fallInPit() {
  inPit = true;
  pitY = 0;
  levitating = false;
  neckExtended = false;
  pitFalls++;
  energy -= 5;
  score -= 10;

  if (typeof sound !== 'undefined' && sound.play) sound.play('hit');

  if (pitFalls === 5) {
    showMessage("WE'RE SORRY.", 180);
  } else if (pitFalls === 10) {
    showMessage("SERIOUSLY WE APOLOGIZE.", 180);
  } else if (pitFalls === 15) {
    showMessage("THIS IS THE GAME. ALL OF IT.", 180);
  } else if (pitFalls % 3 === 0) {
    showTip();
  }
}

function updateET(dt) {
  if (inputDelay > 0) {
    inputDelay -= dt;
    return;
  }

  if (inPit) {
    if (neckExtended) {
      levitating = true;
    }
    if (levitating) {
      pitY -= dt * 0.015;
      energy -= dt * 0.02;
      if (pitY <= -4) {
        inPit = false;
        levitating = false;
        neckExtended = false;
        pitY = 0;
        et.y -= 3;
        if (et.y < 3) et.y = 3;
      }
    }
    return;
  }

  if (pendingDir) {
    et.dx = pendingDir.dx;
    et.dy = pendingDir.dy;
    pendingDir = null;
    inputDelay = 80;
  }

  et.x += et.dx;
  et.y += et.dy;
  et.dx = 0;
  et.dy = 0;

  // Bounds
  if (et.y < 3) et.y = 3;
  if (et.y > GH - 10) et.y = GH - 10;

  // Zone transitions
  if (et.x < 0) {
    currentZone = (currentZone + 5) % 6;
    et.x = GW - 5;
    if (typeof sound !== 'undefined' && sound.play) sound.play('move');
  } else if (et.x > GW - 4) {
    currentZone = (currentZone + 1) % 6;
    et.x = 1;
    if (typeof sound !== 'undefined' && sound.play) sound.play('move');
  }

  // Pit check
  if (checkPitCollision()) {
    fallInPit();
    return;
  }

  // Phone piece pickup
  for (let p of phonePieces) {
    if (!p.collected && p.zone === currentZone) {
      if (Math.abs(et.x - p.x) < 3 && Math.abs(et.y + 4 - p.y) < 4) {
        p.collected = true;
        score += 100;
        if (typeof sound !== 'undefined' && sound.play) sound.play('score');
        let count = phonePieces.filter(pp => pp.collected).length;
        if (count === 3) {
          showMessage('ALL PIECES! GO TO LANDING!', 180);
        } else {
          showMessage('PHONE PIECE ' + count + '/3', 120);
        }
      }
    }
  }

  // Candy pickup
  for (let c of candies) {
    if (c.active && c.zone === currentZone) {
      if (Math.abs(et.x - c.x) < 3 && Math.abs(et.y + 4 - c.y) < 4) {
        c.active = false;
        energy = Math.min(100, energy + 20);
        score += 25;
        if (typeof sound !== 'undefined' && sound.play) sound.play('score');
      }
    }
  }

  // Energy drain
  energy -= dt * 0.008;

  // Check calling home
  if (currentZone === 4 && phonePieces.every(p => p.collected) && neckExtended) {
    state = STATE.CALL;
    callTimer = 0;
    shipY = -10;
    showMessage('CALLING HOME...', 300);
    if (typeof sound !== 'undefined' && sound.play) sound.play('score');
  }
}

function updateEnemies(dt) {
  fbi.moveTimer -= dt;
  if (fbi.moveTimer <= 0) {
    fbi.moveTimer = 200 + randInt(0, 300);
    if (fbi.zone === currentZone) {
      fbi.dx = Math.sign(et.x - fbi.x) * (Math.random() > 0.3 ? 1 : 0);
      fbi.dy = Math.sign(et.y - fbi.y) * (Math.random() > 0.3 ? 1 : 0);
    } else {
      if (Math.random() > 0.8) {
        fbi.zone = (fbi.zone + (Math.random() > 0.5 ? 1 : -1) + 6) % 6;
        fbi.x = randInt(2, GW - 5);
        fbi.y = randInt(4, GH - 9);
      }
    }
  }
  if (fbi.zone === currentZone) {
    fbi.x += fbi.dx;
    fbi.y += fbi.dy;
    fbi.x = Math.max(1, Math.min(GW - 4, fbi.x));
    fbi.y = Math.max(3, Math.min(GH - 9, fbi.y));

    if (!inPit && Math.abs(et.x - fbi.x) < 4 && Math.abs(et.y - fbi.y) < 5) {
      let stolen = phonePieces.find(p => p.collected);
      if (stolen) {
        stolen.collected = false;
        stolen.x = randInt(3, GW - 5);
        stolen.y = randInt(4, GH - 6);
        showMessage('AGENT TOOK YOUR STUFF', 150);
        score -= 50;
        if (typeof sound !== 'undefined' && sound.play) sound.play('hit');
      }
      et.x += (et.x > fbi.x ? 4 : -4);
      inputDelay = 300;
    }
  }

  scientist.moveTimer -= dt;
  if (scientist.moveTimer <= 0) {
    scientist.moveTimer = 300 + randInt(0, 400);
    if (scientist.zone === currentZone) {
      scientist.dx = Math.sign(et.x - scientist.x) * (Math.random() > 0.4 ? 1 : 0);
      scientist.dy = Math.sign(et.y - scientist.y) * (Math.random() > 0.4 ? 1 : 0);
    } else {
      if (Math.random() > 0.85) {
        scientist.zone = (scientist.zone + (Math.random() > 0.5 ? 1 : -1) + 6) % 6;
        scientist.x = randInt(2, GW - 5);
        scientist.y = randInt(4, GH - 9);
      }
    }
  }
  if (scientist.zone === currentZone) {
    scientist.x += scientist.dx;
    scientist.y += scientist.dy;
    scientist.x = Math.max(1, Math.min(GW - 4, scientist.x));
    scientist.y = Math.max(3, Math.min(GH - 9, scientist.y));

    if (!inPit && Math.abs(et.x - scientist.x) < 4 && Math.abs(et.y - scientist.y) < 5) {
      currentZone = 2;
      et.x = Math.floor(GW / 2);
      et.y = Math.floor(GH / 2);
      timer = Math.max(0, timer - 10);
      showMessage('SCIENCE HAPPENED. -10 SEC.', 150);
      if (typeof sound !== 'undefined' && sound.play) sound.play('hit');
      scientist.zone = 0;
      inputDelay = 400;
    }
  }
}

function updateCall(dt) {
  callTimer += dt;
  shipY += dt * 0.005;
  if (shipY >= Math.floor(GH * 0.3)) {
    shipY = Math.floor(GH * 0.3);
  }
  if (callTimer > 4000) {
    state = STATE.WIN;
    winTimer = 0;
    score += Math.ceil(timer) * 10 + Math.ceil(energy) * 5;
    if (typeof sound !== 'undefined' && sound.play) sound.play('score');
  }
}

function update(dt) {
  flashTimer++;

  if (state === STATE.PLAY) {
    timerAccum += dt;
    if (timerAccum >= 1000) {
      timerAccum -= 1000;
      timer--;
    }

    updateET(dt);
    updateEnemies(dt);

    if (tipTimer > 0) tipTimer -= dt * 0.06;
    if (msgTimer > 0) msgTimer -= dt * 0.06;

    if (Math.random() < 0.0003) showTip();

    if (energy <= 0) {
      if (elliottRevives > 0) {
        elliottRevives--;
        energy = 50;
        showMessage('ELLIOTT REVIVED E.T.! (' + elliottRevives + ' LEFT)', 150);
        if (typeof sound !== 'undefined' && sound.play) sound.play('score');
      } else {
        state = STATE.DEAD;
        if (typeof sound !== 'undefined' && sound.play) sound.play('hit');
      }
    }
    if (timer <= 0) {
      state = STATE.DEAD;
      if (typeof sound !== 'undefined' && sound.play) sound.play('hit');
    }
  } else if (state === STATE.CALL) {
    updateCall(dt);
    flashTimer++;
  }
}

// ===== MAIN LOOP =====
let lastTime = 0;
const ET_TICK = 1000 / 60;
let etAccum = 0;

function drawFrame() {
  if (state === STATE.TITLE) {
    drawTitle();
    dpad.style.display = 'none';
    neckBtn.style.display = 'none';
  } else if (state === STATE.DEAD) {
    drawGameOver();
    dpad.style.display = 'none';
    neckBtn.style.display = 'none';
  } else if (state === STATE.WIN) {
    drawWinScreen();
    dpad.style.display = 'none';
    neckBtn.style.display = 'none';
  } else if (state === STATE.PLAY || state === STATE.CALL) {
    drawZone();
    drawPhonePieces();
    drawCandies();
    drawShip();
    drawET();
    drawFBI();
    drawScientist();
    drawHUD();
    drawTip();
    drawMessage();

    dpad.style.display = 'block';
    neckBtn.style.display = 'block';

    if (inPit) {
      ctx.fillStyle = '#000000bb';
      ctx.fillRect(0, PX * 2, W, PX * 2);
      drawText('IN PIT! USE NECK TO LEVITATE', W/2, PX * 3.3, C.red, 10);
    }

    if (state === STATE.CALL) {
      if (flashTimer % 20 < 10) {
        drawText('CALLING HOME...', W/2, H * 0.3, C.green, 16);
      }
    }
  }
}

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 200);
  lastTime = ts;

  etAccum += dt;
  while (etAccum >= ET_TICK) {
    update(ET_TICK);
    etAccum -= ET_TICK;
  }

  drawFrame();
  requestAnimationFrame(gameLoop);
}

// ===== INPUT: D-PAD BUTTONS =====

function dpadInput(dx, dy) {
  if (state === STATE.TITLE) {
    state = STATE.PLAY;
    generateLevel();
    showTip();
    return;
  }
  if (state === STATE.DEAD || state === STATE.WIN) {
    state = STATE.TITLE;
    return;
  }
  if (state !== STATE.PLAY) return;

  if (inPit) {
    // In pit, up = extend neck
    if (dy < 0) {
      neckExtended = true;
      if (typeof sound !== 'undefined' && sound.play) sound.play('move');
    }
    return;
  }

  pendingDir = { dx: dx * 2, dy: dy * 2 };
  neckExtended = false;
}

function neckInput() {
  if (state === STATE.TITLE) {
    state = STATE.PLAY;
    generateLevel();
    showTip();
    return;
  }
  if (state === STATE.DEAD || state === STATE.WIN) {
    state = STATE.TITLE;
    return;
  }
  if (state !== STATE.PLAY) return;

  neckExtended = !neckExtended;
  if (typeof sound !== 'undefined' && sound.play) sound.play('move');
}

// D-pad touch handlers (prevent default to avoid scrolling)
function addBtn(id, dx, dy) {
  let el = document.getElementById(id);
  el.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); dpadInput(dx, dy); }, { passive: false });
  el.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); dpadInput(dx, dy); });
}

addBtn('btn-up', 0, -1);
addBtn('btn-down', 0, 1);
addBtn('btn-left', -1, 0);
addBtn('btn-right', 1, 0);

neckBtn.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); neckInput(); }, { passive: false });
neckBtn.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); neckInput(); });

// ===== INPUT: TOUCH on canvas (tap to start / game over) =====

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (state === STATE.TITLE) {
    state = STATE.PLAY;
    generateLevel();
    showTip();
    return;
  }
  if (state === STATE.DEAD || state === STATE.WIN) {
    state = STATE.TITLE;
    return;
  }
}, { passive: false });

// Keyboard (testing)
document.addEventListener('keydown', function(e) {
  if (state === STATE.TITLE) {
    state = STATE.PLAY;
    generateLevel();
    showTip();
    return;
  }
  if (state === STATE.DEAD || state === STATE.WIN) {
    state = STATE.TITLE;
    return;
  }
  if (state !== STATE.PLAY) return;

  switch(e.key) {
    case 'ArrowLeft':  pendingDir = { dx: -2, dy: 0 }; neckExtended = false; break;
    case 'ArrowRight': pendingDir = { dx: 2, dy: 0 };  neckExtended = false; break;
    case 'ArrowUp':
      if (inPit) {
        neckExtended = true;
      } else {
        pendingDir = { dx: 0, dy: -2 };
        neckExtended = false;
      }
      break;
    case 'ArrowDown': pendingDir = { dx: 0, dy: 2 }; neckExtended = false; break;
    case ' ':
      neckExtended = !neckExtended;
      if (typeof sound !== 'undefined' && sound.play) sound.play('move');
      break;
  }
});

// Mouse click fallback (start/restart)
canvas.addEventListener('click', function(e) {
  if (state === STATE.TITLE) {
    state = STATE.PLAY;
    generateLevel();
    showTip();
    return;
  }
  if (state === STATE.DEAD || state === STATE.WIN) {
    state = STATE.TITLE;
    return;
  }
});

// ===== INIT =====
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(gameLoop);

</script>
</body></html>
