<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Missile Command</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { background: #000; overflow: hidden; touch-action: none; height: 100%; }
  canvas { display: block; }
  #diff-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(180deg, #000020, #0a0040);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    font-family: 'Consolas', 'Courier New', monospace;
  }
  #diff-screen h1 { color: #FF2222; font-size: clamp(20px,5vh,36px); letter-spacing: 4px; text-transform: uppercase; }
  #diff-screen p { color: #78909c; font-size: 12px; }
  .diff-btn {
    background: linear-gradient(180deg, #1a0a0a, #0d0505);
    border: 1px solid #FF4444; color: #FF4444;
    padding: clamp(8px,2vh,14px) 40px; font-size: clamp(14px,3vh,18px);
    cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
    font-family: inherit;
  }
  .diff-btn:hover { background: #2a0a0a; box-shadow: 0 0 10px rgba(255,68,68,0.3); }
  .diff-desc { color: #546e7a; font-size: 11px; margin-top: -8px; }
</style>
</head><body>
<canvas id="c"></canvas>

<!-- Difficulty Selection -->
<div id="diff-screen">
  <h1>Missile Command</h1>
  <p>Choose difficulty</p>
  <button class="diff-btn" onclick="startGame(0)">Cadet</button>
  <div class="diff-desc">Slow missiles, small waves. Learn the ropes.</div>
  <button class="diff-btn" onclick="startGame(1)">Commander</button>
  <div class="diff-desc">Standard speed. The Cold War experience.</div>
  <button class="diff-btn" onclick="startGame(2)">Armageddon</button>
  <div class="diff-desc">Fast, relentless. Cities will burn.</div>
</div>

<script src="sound.js"></script>
<script src="loader.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

// Difficulty presets: [baseSpeed, speedPerLevel, baseMissiles, missilesPerLevel]
const DIFF = [
  { baseSpd: 0.3, spdLvl: 0.08, baseMsl: 5, mslLvl: 2, name: 'CADET' },
  { baseSpd: 0.5, spdLvl: 0.12, baseMsl: 8, mslLvl: 3, name: 'COMMANDER' },
  { baseSpd: 0.8, spdLvl: 0.18, baseMsl: 12, mslLvl: 5, name: 'ARMAGEDDON' },
];
let diff = DIFF[1];

// Colors
const SKY_TOP = '#000020';
const SKY_BOTTOM = '#0a0040';
const GROUND_COLOR = '#8B6914';
const CITY_COLOR = '#00CCFF';
const CITY_DARK = '#006688';
const EXPLOSION_INNER = '#FFFFCC';
const EXPLOSION_MID = '#FF8800';

let cities, batteries, missiles, rockets, explosions, particles, warheadParticles;
let score, level, gameOver, gameStarted, waveActive, waveTimer, missilesThisWave, missilesLaunched;

// ── Air Raid Siren ──
let audioCtx = null;
let sirenNode = null;
let sirenEnabled = true;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function startSiren() {
  if (!sirenEnabled || sirenNode) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 420;
    lfo.type = 'triangle';
    lfo.frequency.value = 0.35;
    lfoGain.gain.value = 180;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(gain);
    gain.gain.value = 0;
    gain.connect(ctx.destination);
    osc.start();
    lfo.start();
    sirenNode = { osc, lfo, gain };
  } catch(e) {}
}

function stopSiren() {
  if (sirenNode) {
    try { sirenNode.osc.stop(); sirenNode.lfo.stop(); } catch(e) {}
    sirenNode = null;
  }
}

function updateSirenVolume() {
  if (!sirenNode || !sirenEnabled) return;
  let threat = 0;
  const h = H();
  for (const m of missiles) {
    const closeness = m.y / (h - 35);
    if (closeness > 0.3) threat = Math.max(threat, closeness);
  }
  const vol = missiles.length > 0 ? 0.01 + threat * 0.04 : 0;
  try { sirenNode.gain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.3); } catch(e) {}
}

function startGame(diffIdx) {
  diff = DIFF[diffIdx];
  document.getElementById('diff-screen').style.display = 'none';
  // Ensure AudioContext is created on user gesture
  getAudio();
  init();
  gameStarted = true;
}

function init() {
  const w = W(), h = H();
  const groundY = h - 35;
  batteries = [
    { x: w * 0.12, y: groundY, ammo: 10 },
    { x: w * 0.50, y: groundY, ammo: 10 },
    { x: w * 0.88, y: groundY, ammo: 10 },
  ];
  const cityPositions = [0.22, 0.32, 0.40, 0.60, 0.70, 0.78];
  cities = cityPositions.map(p => ({
    x: w * p, y: groundY, alive: true, buildings: generateBuildings()
  }));
  missiles = [];
  rockets = [];
  explosions = [];
  particles = [];
  warheadParticles = [];
  score = 0;
  level = 1;
  gameOver = false;
  waveActive = true;
  waveTimer = 0;
  missilesThisWave = diff.baseMsl + level * diff.mslLvl;
  missilesLaunched = 0;
  stopSiren();
}

function generateBuildings() {
  const count = 3 + Math.floor(Math.random() * 3);
  const blds = [];
  for (let i = 0; i < count; i++) {
    blds.push({
      offsetX: (i - count/2) * 8 + Math.random() * 4,
      w: 5 + Math.random() * 6,
      h: 10 + Math.random() * 18,
      lit: Math.random() > 0.3
    });
  }
  return blds;
}

function nearestBattery(tx, ty) {
  let best = null, bestDist = Infinity;
  for (const b of batteries) {
    if (b.ammo <= 0) continue;
    const d = Math.abs(b.x - tx);
    if (d < bestDist) { bestDist = d; best = b; }
  }
  return best;
}

function fire(tx, ty) {
  if (gameOver) {
    document.getElementById('diff-screen').style.display = 'flex';
    gameStarted = false;
    stopSiren();
    return;
  }
  if (!gameStarted) return;
  const bat = nearestBattery(tx, ty);
  if (!bat) return;
  bat.ammo--;
  const dx = tx - bat.x, dy = ty - bat.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const speed = 7;
  rockets.push({
    x: bat.x, y: bat.y, targetX: tx, targetY: ty,
    vx: dx / dist * speed, vy: dy / dist * speed,
    trail: [{x: bat.x, y: bat.y, age: 0}]
  });
  if (typeof SFX !== 'undefined') SFX.shoot();
}

canvas.addEventListener('click', e => fire(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  fire(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

function spawnMissile() {
  const targets = cities.filter(c => c.alive);
  if (targets.length === 0) return;
  const allTargets = [...targets, ...batteries.filter(b => b.ammo > 0)];
  const target = allTargets[Math.floor(Math.random() * allTargets.length)];
  const startX = Math.random() * W();
  const dx = target.x - startX, dy = target.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const speed = diff.baseSpd + level * diff.spdLvl + Math.random() * 0.2;
  const mirv = level >= 3 && Math.random() < 0.2;
  missiles.push({
    x: startX, y: -5, startX, startY: -5,
    vx: dx / dist * speed, vy: dy / dist * speed,
    trail: [{x: startX, y: -5, age: 0}],
    mirv, mirvSplit: false, splitY: H() * (0.3 + Math.random() * 0.3)
  });
}

function update() {
  if (!gameStarted || gameOver) return;

  // Spawn
  if (waveActive && missilesLaunched < missilesThisWave) {
    waveTimer++;
    const interval = Math.max(15, 60 - level * 5);
    if (waveTimer >= interval) {
      waveTimer = 0;
      spawnMissile();
      missilesLaunched++;
      if (sirenEnabled && !sirenNode) startSiren();
    }
  }
  updateSirenVolume();

  // Enemy missiles
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    m.x += m.vx;
    m.y += m.vy;
    m.trail.push({x: m.x, y: m.y, age: 0});

    // Warhead particles (fire trail)
    if (Math.random() < 0.6) {
      warheadParticles.push({
        x: m.x + (Math.random() - 0.5) * 4,
        y: m.y + (Math.random() - 0.5) * 4,
        vx: (Math.random() - 0.5) * 0.5 - m.vx * 0.1,
        vy: (Math.random() - 0.5) * 0.5 - m.vy * 0.1,
        life: 15 + Math.random() * 20,
        maxLife: 35,
        r: 1 + Math.random() * 2,
      });
    }

    // MIRV
    if (m.mirv && !m.mirvSplit && m.y > m.splitY) {
      m.mirvSplit = true;
      for (let k = 0; k < 2; k++) {
        const targets = cities.filter(c => c.alive);
        if (targets.length === 0) break;
        const t = targets[Math.floor(Math.random() * targets.length)];
        const dx = t.x - m.x, dy = t.y - m.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const spd = Math.sqrt(m.vx*m.vx + m.vy*m.vy) * 1.1;
        missiles.push({
          x: m.x, y: m.y, startX: m.x, startY: m.y,
          vx: dx / dist * spd, vy: dy / dist * spd,
          trail: [{x: m.x, y: m.y, age: 0}],
          mirv: false, mirvSplit: false, splitY: 0
        });
      }
    }

    // Hit ground
    if (m.y >= H() - 35) {
      for (const city of cities) {
        if (city.alive && Math.abs(m.x - city.x) < 20) {
          city.alive = false;
          addExplosion(m.x, H() - 35, 50, '#FF4400');
          addParticles(m.x, H() - 35, 15, CITY_COLOR);
          if (typeof SFX !== 'undefined') SFX.cityDestroyed();
        }
      }
      for (const bat of batteries) {
        if (bat.ammo > 0 && Math.abs(m.x - bat.x) < 15) {
          bat.ammo = 0;
          addExplosion(m.x, H() - 35, 35, '#FF8800');
        }
      }
      addExplosion(m.x, H() - 35, 30, '#FF2200');
      missiles.splice(i, 1);
      if (!cities.some(c => c.alive)) { gameOver = true; stopSiren(); }
      continue;
    }

    // Explosion collision
    let destroyed = false;
    for (const exp of explosions) {
      const dx = m.x - exp.x, dy = m.y - exp.y;
      if (dx * dx + dy * dy < exp.r * exp.r) {
        missiles.splice(i, 1);
        score += 25;
        addParticles(m.x, m.y, 8, '#FF4444');
        if (typeof SFX !== 'undefined') SFX.explosion();
        destroyed = true;
        break;
      }
    }
    if (destroyed) continue;
  }

  // Player rockets
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.x += r.vx; r.y += r.vy;
    r.trail.push({x: r.x, y: r.y, age: 0});
    const dx = r.x - r.targetX, dy = r.y - r.targetY;
    if (dx * dx + dy * dy < 80) {
      addExplosion(r.targetX, r.targetY, 50, EXPLOSION_MID);
      rockets.splice(i, 1);
      if (typeof SFX !== 'undefined') SFX.bigExplosion();
    }
  }

  // Explosions + friendly fire
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    if (e.growing) {
      e.r += 1.8;
      if (e.r >= e.maxR) e.growing = false;
      for (const city of cities) {
        if (city.alive) {
          const dx = city.x - e.x, dy = city.y - e.y;
          if (dx * dx + dy * dy < e.r * e.r) {
            city.alive = false;
            addParticles(city.x, city.y, 10, '#FF8800');
          }
        }
      }
      for (const bat of batteries) {
        if (bat.ammo > 0) {
          const dx = bat.x - e.x, dy = bat.y - e.y;
          if (dx * dx + dy * dy < (e.r * 0.7) * (e.r * 0.7)) bat.ammo = 0;
        }
      }
    } else {
      e.r -= 0.6;
      if (e.r <= 0) explosions.splice(i, 1);
    }
  }

  // Trail aging
  for (const m of missiles) { for (const t of m.trail) t.age++; }
  for (const r of rockets) { for (const t of r.trail) t.age++; }
  for (const m of missiles) { m.trail = m.trail.filter(t => t.age < 300); }
  for (const r of rockets) { r.trail = r.trail.filter(t => t.age < 120); }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Warhead particles
  for (let i = warheadParticles.length - 1; i >= 0; i--) {
    const p = warheadParticles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) warheadParticles.splice(i, 1);
  }

  // Wave end
  if (missilesLaunched >= missilesThisWave && missiles.length === 0 && !gameOver) {
    stopSiren();
    level++;
    missilesThisWave = diff.baseMsl + level * diff.mslLvl;
    missilesLaunched = 0;
    for (const b of batteries) b.ammo = 10;
    score += cities.filter(c => c.alive).length * 50;
  }
}

function addExplosion(x, y, maxR, color) {
  explosions.push({ x, y, r: 3, maxR, growing: true, color });
}

function addParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
      life: 20 + Math.random() * 30, color
    });
  }
}

function draw() {
  const w = W(), h = H();

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
  skyGrad.addColorStop(0, SKY_TOP);
  skyGrad.addColorStop(1, SKY_BOTTOM);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, w, h);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 80; i++) {
    const sx = (i * 173 + 37) % w;
    const sy = (i * 131 + 17) % (h - 80);
    ctx.globalAlpha = 0.2 + Math.sin(Date.now() / 1000 + i) * 0.15;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Ground
  ctx.fillStyle = GROUND_COLOR;
  ctx.beginPath();
  ctx.moveTo(0, h);
  ctx.lineTo(0, h - 30);
  for (let x = 0; x <= w; x += 20) {
    ctx.lineTo(x, h - 30 + Math.sin(x * 0.02) * 5 + Math.sin(x * 0.05) * 3);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#5a4510';
  ctx.fillRect(0, h - 15, w, 15);

  // Warhead particles (fire trail behind missiles)
  for (const p of warheadParticles) {
    const t = p.life / p.maxLife;
    // Hot core → cooling embers
    const r = Math.floor(255);
    const g = Math.floor(100 + 155 * t);
    const b = Math.floor(50 * t);
    ctx.fillStyle = `rgba(${r},${g},${b},${t * 0.8})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemy missile trails
  for (const m of missiles) {
    if (m.trail.length < 2) continue;
    for (let j = 1; j < m.trail.length; j++) {
      const t0 = m.trail[j-1], t1 = m.trail[j];
      const alpha = Math.max(0, 1 - t0.age / 300);
      ctx.strokeStyle = `rgba(255,68,68,${alpha * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(t0.x, t0.y);
      ctx.lineTo(t1.x, t1.y);
      ctx.stroke();
    }
    // Warhead glow
    ctx.fillStyle = '#FF4444';
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(m.x, m.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Player rocket trails
  for (const r of rockets) {
    if (r.trail.length < 2) continue;
    for (let j = 1; j < r.trail.length; j++) {
      const t0 = r.trail[j-1], t1 = r.trail[j];
      const alpha = Math.max(0, 1 - t0.age / 120);
      ctx.strokeStyle = `rgba(68,255,68,${alpha * 0.6})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(t0.x, t0.y);
      ctx.lineTo(t1.x, t1.y);
      ctx.stroke();
    }
    ctx.fillStyle = '#88FF88';
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2, 0, Math.PI * 2);
    ctx.fill();
    // Crosshair
    ctx.strokeStyle = 'rgba(68,255,68,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(r.targetX - 8, r.targetY); ctx.lineTo(r.targetX + 8, r.targetY);
    ctx.moveTo(r.targetX, r.targetY - 8); ctx.lineTo(r.targetX, r.targetY + 8);
    ctx.stroke();
  }

  // Explosions
  for (const e of explosions) {
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
    grad.addColorStop(0, EXPLOSION_INNER);
    grad.addColorStop(0.3, e.color || EXPLOSION_MID);
    grad.addColorStop(0.7, 'rgba(255,50,0,0.3)');
    grad.addColorStop(1, 'rgba(255,20,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Debris particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 50);
    ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Cities
  for (const city of cities) {
    if (!city.alive) {
      ctx.fillStyle = '#333';
      ctx.fillRect(city.x - 12, h - 38, 24, 4);
      continue;
    }
    for (const b of city.buildings) {
      const bx = city.x + b.offsetX, by = h - 35 - b.h;
      ctx.fillStyle = CITY_DARK;
      ctx.fillRect(bx, by, b.w, b.h);
      if (b.lit) {
        ctx.fillStyle = CITY_COLOR;
        for (let wy = by + 3; wy < by + b.h - 3; wy += 5) {
          for (let wx = bx + 1; wx < bx + b.w - 2; wx += 3) {
            if (Math.random() > 0.3) ctx.fillRect(wx, wy, 2, 2);
          }
        }
      }
    }
  }

  // Batteries
  for (const bat of batteries) {
    ctx.fillStyle = bat.ammo > 0 ? '#558855' : '#444';
    ctx.beginPath();
    ctx.moveTo(bat.x - 12, h - 30);
    ctx.lineTo(bat.x - 8, h - 42);
    ctx.lineTo(bat.x + 8, h - 42);
    ctx.lineTo(bat.x + 12, h - 30);
    ctx.closePath();
    ctx.fill();
    if (bat.ammo > 0) {
      ctx.fillStyle = '#88FF88';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(bat.ammo, bat.x, h - 44);
    }
  }

  // HUD
  ctx.fillStyle = '#00CCFF';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 10, 22);
  ctx.textAlign = 'right';
  ctx.fillText('WAVE ' + level + ' [' + diff.name + ']', w - 10, 22);
  const totalAmmo = batteries.reduce((s, b) => s + b.ammo, 0);
  ctx.textAlign = 'center';
  ctx.fillStyle = totalAmmo > 5 ? '#44FF44' : (totalAmmo > 0 ? '#FFAA00' : '#FF4444');
  ctx.fillText('MISSILES: ' + totalAmmo, w / 2, 22);

  // Game over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#FF2222';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('THE END', w / 2, h / 2 - 40);
    ctx.fillStyle = '#00CCFF';
    ctx.font = '20px monospace';
    ctx.fillText('Score: ' + score, w / 2, h / 2);
    ctx.fillText('Wave: ' + level, w / 2, h / 2 + 28);
    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    ctx.fillText('Tap to restart', w / 2, h / 2 + 65);
  }
}

const TICK = 1000 / 60;
let lastTimeMs = 0;
let accumulator = 0;

function loop(timestamp) {
  if (!lastTimeMs) lastTimeMs = timestamp;
  const dt = Math.min(timestamp - lastTimeMs, 200);
  lastTimeMs = timestamp;
  accumulator += dt;
  while (accumulator >= TICK) {
    update();
    accumulator -= TICK;
  }
  draw();
  requestAnimationFrame(loop);
}
// Don't auto-init — wait for difficulty selection
gameStarted = false;
requestAnimationFrame(loop);
</script>
</body></html>
